<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">


<head>
    <meta charset="utf-8" />
    <title>CSS Raw Page</title>
</head>


<body id="pageMarginsID">

    <header class="myHeader">
        <div class="header-left">
            <div class="amazonLogo">
                <a href="original.html">
                    <img src="images/Amazon_Logo.png" alt="Amazon Logo">
                </a>
            </div>
            <div class="location-widget">
                <img src="images/Header_2.png" alt="Location">
            </div>
        </div>
        <img src="images/Scroll_Bar_2.png" alt="Scroll_Bar" id="scrollBar">
        <div class="header-search">
            <select class="search-dropdown"><option>All</option></select>
            <input type="text" class="search-input" placeholder="Search Amazon">
            <button class="search-button">🔍</button>
        </div>

        <div class="header-right">
            <div class="lang-select">🇺🇸 EN</div>
            <div class="account-links">Hello, sign in</div>
            <div class="orders-link">Returns & Orders</div>
            <div class="cart-link">🛒 Cart</div>
        </div>
    </header>


    <!--Where the navigation bar section is-->
    <ul class="navBar">
        <li id="all">All</li>
        <li>Amazon Haul</li>
        <li>Medical Care</li>
        <li>Amazon Basics</li>
        <li>Best Sellers</li>
        <li>Prime</li>
        <li>Books</li>
        <li>Today's Deals</li>
        <li>New Releases</li>
        <li>Groceries</li>
        <li><img src="images/Nav_Side_Image.png" alt="Side Logos"></li>
    </ul>


    <div class="banner-box">
        <img src="images/MiddleSection.png" alt="Banner" class="banner-img">
    </div>

    <div class="gradient-backdrop"></div>

    <div class="box-grid">
        <div class="white-box">
            <h3>Save on Amazon Devices</h3>
            <div class="card-img-container">
                <img src="images/image1.png" alt="Amazon Devices">
            </div>
        </div>
        <div class="white-box">
            <h3>15% off designer handbags</h3>
            <div class="card-img-container">
                <img src="images/image23.png" alt="Designer Handbags">
            </div>
        </div>
        <div class="white-box">
            <h3>Deals on tech</h3>
            <div class="card-img-container">
                <img src="images/image3.png" alt="Deals on Tech">
            </div>
        </div>
        <div class="white-box">
            <h3>Sign in for the best experience</h3>
            <div class="card-img-container bottom-image">
                <img src="images/image4.png" alt="Garage setup">
            </div>
        </div>
    </div>
</body>


</html>

<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>A CSS Demonstration Index Page</title>
    <link rel="stylesheet" href="styles/default_redo.css">
</head>

<body>
    <!--HEADER SECTION-->
    <header>
        <!--Left Section of the Header-->
        <div class="left_header">
            <img src="images/Amazon_Logo.png" alt="Amazon Logo" class="logo">
            <img src="images/Header_2.png" alt="Location" class="location">
        </div>

        <!--Middle Section of the Header-->
        <div class="middle_header">
            <form>
                <input type="text" name="search" placeholder="Search Amazon">
            </form>
        </div>
        
        <!--Right Section of the Header-->
        <div class="right_header">
            <div class="language">
                <!--Right Header Part 1-->
                <img src="images/USA_flag.png" alt="USA Flag" class="flag">
                <span>EN</span>
            </div>
            <div class="hello_accounts">
                <!--Right Header Part 2-->
                <span class="hello_section">Hello, sign in</span>
                <span class="accounts_section">Accounts & Lists</span>
            </div>
            <div class="returns_orders">
                <!--Right Header Part 3-->
                <span class="returns">Returns</span>
                <span class="orders">& Orders</span>
            </div>
            <div class="cart">
                <!--Right Header Part 4-->
                <span class="number_of_items">0</span>
                <span class="cartS">Cart</span>
            </div>
        </div>
    </header>

    <!--NAVIGATION BAR SECTION-->
    <ul>
        <li></li>
    </ul>

    <!--Section 1-->
    <section>
    </section>

    <!--Section 2-->
    <section>
    </section>

    <!--Boxes Section-->
    <div>
    </div>

    <!--Footer Section-->
    <footer>
    </footer>

</body>
</html>
